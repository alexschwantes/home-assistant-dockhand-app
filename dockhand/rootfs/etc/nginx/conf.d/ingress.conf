server {
    listen 8099;

    # Only accept connections from the HA Ingress gateway
    allow  172.30.32.2;
    deny   all;

    # Home Assistant ingress shim injected into HTML responses.
    location = /__ha_ingress_shim.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "(function(){var b=document.querySelector('base[href]');if(!b)return;var hs=b.getAttribute('href')||'';var p=hs.endsWith('/')?hs.slice(0,-1):hs;if(!p)return;var o=window.location.origin;function fix(u){if(typeof u!=='string')return u;if(u[0]==='/'&&u.slice(0,2)!=='//'&&!u.startsWith(p+'/')&&u!==p)return p+u;if(u.startsWith(o+'/')&&!u.startsWith(o+p+'/')&&u!==o+p)return o+p+u.slice(o.length);return u}var URL0=window.URL;function URL1(i,b){if(typeof i==='string')i=fix(i);if(typeof b==='string')b=fix(b);return new URL0(i,b)}URL1.prototype=URL0.prototype;try{Object.setPrototypeOf(URL1,URL0)}catch(e){}window.URL=URL1;var f0=window.fetch;if(f0)window.fetch=function(i,n){if(typeof i==='string')i=fix(i);return f0.call(this,i,n)};var x0=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(m,u){if(typeof u==='string')u=fix(u);return x0.apply(this,[m,u].concat(Array.prototype.slice.call(arguments,2)))};var e0=window.EventSource;if(e0)window.EventSource=function(u,c){if(typeof u==='string')u=fix(u);return new e0(u,c)};var pu0=history.pushState;history.pushState=function(s,t,u){if(typeof u==='string')u=fix(u);return pu0.call(this,s,t,u)};var re0=history.replaceState;history.replaceState=function(s,t,u){if(typeof u==='string')u=fix(u);return re0.call(this,s,t,u)};var a0=Location.prototype.assign;Location.prototype.assign=function(u){if(typeof u==='string')u=fix(u);return a0.call(this,u)};var r0=Location.prototype.replace;Location.prototype.replace=function(u){if(typeof u==='string')u=fix(u);return r0.call(this,u)};document.addEventListener('DOMContentLoaded',function(){Object.keys(window).forEach(function(k){if(/^__sveltekit/.test(k)&&window[k]&&typeof window[k].base==='string'){Object.defineProperty(window[k],'base',{get:function(){return p},configurable:true})}})});var M=window.MutationObserver;if(!M)return;function fe(n){if(n.nodeType!==1)return;['src','href','action'].forEach(function(a){var v=n.getAttribute&&n.getAttribute(a);if(v&&typeof v==='string'){var nv=fix(v);if(nv!==v)n.setAttribute(a,nv)}});if(n.querySelectorAll)n.querySelectorAll('[src],[href],[action]').forEach(fe)}new M(function(ms){ms.forEach(function(m){m.addedNodes.forEach(fe)})}).observe(document.documentElement,{childList:true,subtree:true})})();";
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (required for Dockhand terminal & live log streaming)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection  $http_connection;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Ingress-Path    $http_x_ingress_path;

        # Disable upstream compression so sub_filter can rewrite HTML
        proxy_set_header   Accept-Encoding   "";

        # Inject base path and external shim into every HTML response.
        sub_filter '<head>' "<head><base href=\"$http_x_ingress_path/\"><script src=\"__ha_ingress_shim.js\"></script>";
        sub_filter_types   application/xhtml+xml;
        sub_filter_once    on;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

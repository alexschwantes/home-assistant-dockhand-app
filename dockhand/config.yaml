name: Dockhand
version: "1.0.0"
slug: dockhand
description: "Modern Docker management UI: a lightweight Portainer alternative."
url: "https://github.com/Finsys/dockhand"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:docker
panel_title: Dockhand
ports:
  3000/tcp: null
devices:
  - /var/run/docker.sock
hassio_role: admin
docker_api: true
map:
  - type: data
    read_only: false
init: false
stage: experimental
apparmor: true
watchdog: "http://[HOST]:[PORT:8099]/"
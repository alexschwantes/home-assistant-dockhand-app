name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Validate tag, config version, and changelog
        id: validate
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CONFIG_VERSION=$(sed -n 's/^version:[[:space:]]*"\([^"]*\)"$/\1/p' dockhand/config.yaml)

          if [[ -z "${CONFIG_VERSION}" ]]; then
            echo "Could not read version from dockhand/config.yaml"
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${CONFIG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match dockhand/config.yaml version (${CONFIG_VERSION})"
            exit 1
          fi

          if ! grep -Eq "^##[[:space:]]+${TAG_VERSION}$" dockhand/CHANGELOG.md; then
            echo "dockhand/CHANGELOG.md does not contain a section header for ${TAG_VERSION}"
            exit 1
          fi

          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from changelog
        id: notes
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          notes=$(awk -v ver="${VERSION}" '
            $0 ~ "^##[[:space:]]+" ver "$" { capture=1; next }
            capture && $0 ~ "^##[[:space:]]+" { exit }
            capture { print }
          ' dockhand/CHANGELOG.md)

          if [[ -z "${notes// /}" ]]; then
            echo "Could not extract release notes for ${VERSION} from dockhand/CHANGELOG.md"
            exit 1
          fi

          {
            echo "release_notes<<EOF"
            echo "${notes}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build and publish release images
    needs: validate
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/build-app.yaml
    with:
      app: dockhand
      publish: true
      image_tags: |
        ${{ needs.validate.outputs.version }}
        latest
    secrets: inherit

  github-release:
    name: Create GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ needs.validate.outputs.version }}
          tag_name: v${{ needs.validate.outputs.version }}
          body: ${{ needs.validate.outputs.release_notes }}
